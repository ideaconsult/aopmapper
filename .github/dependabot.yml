---
version: 2
updates:

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - "kerberizer"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - "kerberizer"
    ignore:
      - dependency-name: "react"
        versions: [">= 19.0.0"]
      - dependency-name: "react-dom"
        versions: [">= 19.0.0"]
      - dependency-name: "@types/react"
        versions: [">= 19.0.0"]
      - dependency-name: "@types/react-dom"
        versions: [">= 19.0.0"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - "kerberizer"
